name: modelfit

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${MODELFIT_POSTGRES_DB}
      POSTGRES_USER: ${MODELFIT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MODELFIT_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MODELFIT_POSTGRES_USER} -d ${MODELFIT_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MODELFIT_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MODELFIT_MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env
    environment:
      MODELFIT_DATABASE_URL: postgresql+asyncpg://${MODELFIT_POSTGRES_USER}:${MODELFIT_POSTGRES_PASSWORD}@postgres:5432/${MODELFIT_POSTGRES_DB}
      MODELFIT_REDIS_URL: redis://redis:6379/0
      MODELFIT_MINIO_ENDPOINT: minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    environment:
      MODELFIT_DATABASE_URL: postgresql+asyncpg://${MODELFIT_POSTGRES_USER}:${MODELFIT_POSTGRES_PASSWORD}@postgres:5432/${MODELFIT_POSTGRES_DB}
      MODELFIT_REDIS_URL: redis://redis:6379/0
      MODELFIT_MINIO_ENDPOINT: minio:9000
      MODELFIT_MCP_DOCUMENT_URL: http://mcp-document:9101/mcp
      MODELFIT_MCP_IMAGE_URL: http://mcp-image:9102/mcp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  ui:
    build:
      context: .
      dockerfile: infra/docker/ui.Dockerfile
    env_file: .env
    environment:
      MODELFIT_API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

  mlflow:
    build:
      context: .
      dockerfile: infra/docker/mlflow.Dockerfile
    profiles: ["mlops"]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts


  mcp-document:
    build:
      context: .
      dockerfile: infra/docker/mcp.Dockerfile
    command: ["python", "services/mcp_document/server.py"]
    ports:
      - "9101:9101"
    volumes:
      - ./data:/data:ro

  mcp-image:
    build:
      context: .
      dockerfile: infra/docker/mcp.Dockerfile
    command: ["python", "services/mcp_image/server.py"]
    ports:
      - "9102:9102"
    volumes:
      - ./data:/data:ro

  mcp-web:
    build:
      context: .
      dockerfile: infra/docker/mcp.Dockerfile
    command: ["python", "services/mcp_web/server.py"]
    profiles: ["web-tools"]
    ports:
      - "9103:9103"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mlflow_data:

image:
  repository: ghcr.io/your-org/modelfit
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 2
  port: 8000

ui:
  replicas: 2
  port: 8501

worker:
  replicas: 2

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

postgresql:
  external: true

redis:
  external: true

minio:
  external: true

services:
  vllm-candidate:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    profiles: ["gpu"]
    runtime: nvidia
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command:
      - --model
      - ${VLLM_MODEL_ID:-Qwen/Qwen3-8B}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-candidate}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8100:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface

volumes:
  huggingface_cache:
